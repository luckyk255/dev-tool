<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor-Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.min.css" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      startup: {
        pageReady: () => MathJax.startup.defaultPageReady()
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="./script.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="app-toolbar glass-card">
      <div class="toolbar-top-row">
        <div class="toolbar-brand">Editor-Pro</div>
        <div class="header-actions">
          <button class="ghost-btn ghost-btn--compact" id="themeToggle" type="button" data-i18n="themeLight">浅色</button>
          <button class="ghost-btn ghost-btn--compact" id="langToggle" type="button">EN</button>
        </div>
      </div>
      <div class="toolbar-actions-row">
        <div class="mode-group" id="modeGroup" role="tablist" aria-label="Editor mode">
          <button class="mode-btn active" type="button" data-mode="markdown" data-i18n="modeMarkdown" role="tab" aria-selected="true">Markdown + LaTeX</button>
          <button class="mode-btn" type="button" data-mode="json" data-i18n="modeJson" role="tab" aria-selected="false">JSON Formatter</button>
          <button class="mode-btn" type="button" data-mode="sql" data-i18n="modeSql" role="tab" aria-selected="false">SQL Formatter</button>
          <button class="mode-btn" type="button" data-mode="timestamp" data-i18n="modeTimestamp" role="tab" aria-selected="false">时间转换</button>
        </div>
        <div class="action-group">
          <label class="upload-btn upload-btn--compact" for="fileInput" data-i18n="importBtn">导入文件</label>
          <input id="fileInput" type="file" hidden />
          <button class="ghost-btn ghost-btn--compact" id="formatBtn" type="button" data-i18n="formatBtn" hidden>格式化</button>
          <button class="ghost-btn ghost-btn--compact" id="downloadBtn" type="button" data-i18n="downloadBtn">导出文件</button>
          <button class="primary-btn primary-btn--compact" id="copyBtn" type="button" data-i18n="copyBtn">复制内容</button>
        </div>
      </div>
    </div>

    <main class="workspace" id="workspace">
      <section class="panel editor-panel glass-card">
        <div class="panel-header">
          <div>
            <span data-i18n="inputPanel">输入区</span>
            <span class="panel-tip" id="saveStatus" data-i18n="autosaveReady">自动保存已开启</span>
          </div>
          <span class="panel-badge" id="modeHint" data-i18n="hintMarkdown">支持 Markdown 和 LaTeX 公式</span>
        </div>
        <div class="editor-body">
          <div class="line-numbers" id="editorLineNumbers" aria-hidden="true"></div>
          <textarea id="editor" spellcheck="false" wrap="off"></textarea>
        </div>
      </section>

      <div class="splitter" id="splitter" role="separator" aria-orientation="vertical" aria-label="Resize panels"></div>

      <section class="panel preview-panel glass-card">
        <div class="panel-header">
          <div>
            <span data-i18n="previewPanel">预览区</span>
            <span class="panel-tip" data-i18n="previewLive">实时渲染</span>
          </div>
          <span class="panel-badge" data-i18n="previewTip">优雅阅读视图</span>
        </div>
        <div class="preview-body">
          <div id="preview" class="preview markdown-body"></div>
        </div>
      </section>
    </main>

    <main class="timestamp-workspace" id="timestampWorkspace" hidden>
      <section class="panel timestamp-panel glass-card">
        <div class="panel-header">
          <div>
            <span data-i18n="timestampTitle">时间戳转换</span>
            <span class="panel-tip" data-i18n="timestampTip">自动识别秒和毫秒时间戳</span>
          </div>
          <button class="ghost-btn ghost-btn--compact" id="useCurrentTimeBtn" type="button" data-i18n="useCurrentTime">使用当前时间</button>
        </div>
        <div class="timestamp-body">
          <div class="timestamp-field">
            <label for="timestampInput" data-i18n="timestampLabel">时间戳</label>
            <div class="timestamp-input-row">
              <input id="timestampInput" type="text" inputmode="numeric" placeholder="1717986912 / 1717986912000" />
              <button class="primary-btn" id="timestampToTimeBtn" type="button" data-i18n="toDateTime">转换为时间</button>
            </div>
            <span class="field-help" data-i18n="timestampHelp">10 位按秒、13 位按毫秒处理</span>
          </div>

          <div class="timestamp-divider" aria-hidden="true">⇄</div>

          <div class="timestamp-field">
            <label for="dateTimeInput" data-i18n="dateTimeLabel">本地时间</label>
            <div class="timestamp-input-row">
              <input id="dateTimeInput" type="text" placeholder="2026-06-13 00:00:00" />
              <button class="primary-btn" id="timeToTimestampBtn" type="button" data-i18n="toTimestamp">转换为时间戳</button>
            </div>
            <span class="field-help" data-i18n="dateTimeHelp">可手动输入，例如 2026-06-13 00:00:00</span>
            <div class="timestamp-results">
              <div><span data-i18n="secondsTimestamp">秒级时间戳</span><code id="secondsTimestamp">-</code></div>
              <div><span data-i18n="millisecondsTimestamp">毫秒级时间戳</span><code id="millisecondsTimestamp">-</code></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
</body>
</html>
